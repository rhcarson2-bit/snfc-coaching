<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNEFC Pro Scout - Local Context</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --snefc-blue: #004a99; --danger: #dc3545; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app-container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        
        .mgmt-console { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; border: 1px solid #dee2e6; flex-wrap: wrap; }
        .mgmt-group { display: flex; flex-direction: column; gap: 5px; min-width: 160px; }
        .mgmt-group label { font-size: 10px; font-weight: bold; color: #495057; text-transform: uppercase; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--snefc-blue); padding-bottom: 10px; margin-bottom: 20px; }
        
        .filter-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 12px; }
        .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; width: 85px; }
        .filter-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 12px; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: var(--snefc-blue) !important; color: white !important; border-color: var(--snefc-blue) !important; }

        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1200px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; cursor: pointer; border-bottom: 2px solid #dee2e6; color: #495057; text-transform: uppercase; font-size: 11px; }
        td { padding: 6px 12px; border-bottom: 1px solid #eee; }

        .inline-edit { width: 100%; padding: 8px; border: 1px solid transparent; border-radius: 4px; font-size: 14px; background: transparent; box-sizing: border-box; }
        .inline-edit:hover { border-color: #ddd; background: #fff; }

        .modal { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: white; margin: 20px auto; padding: 30px; width: 90%; max-width: 850px; border-radius: 12px; max-height: 90vh; overflow-y: auto; position: relative; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .span-2 { grid-column: span 2; }
        .span-3 { grid-column: span 3; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: var(--snefc-blue); text-transform: uppercase; }
        input, select, textarea { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 16px; }
        
        .btn { padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background: var(--snefc-blue); color: white; }
        .btn-outline { border: 1px solid #ddd; background: white; }
        .player-link { color: var(--snefc-blue); font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="mgmt-console">
        <div class="mgmt-group">
            <label>Active Team (Local)</label>
            <select id="activeTeamSelect" onchange="updateLocalContext('activeTeam', this.value)"></select>
        </div>
        <div class="mgmt-group">
            <label>Active Season (Local)</label>
            <select id="activeSeasonSelect" onchange="updateLocalContext('activeSeason', this.value)"></select>
        </div>
        <button class="btn btn-outline" onclick="openMgmtModal()">Manage Tryout Season</button>
        <div style="margin-left: auto;">
            <button class="btn btn-blue" onclick="openPlayerModal('')">+ On-Site Add</button>
        </div>
    </div>

    <div class="header">
        <h2 id="displayTitle" style="margin:0; color:var(--snefc-blue);">SNEFC Dashboard</h2>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <span class="filter-label">Status:</span>
            <button class="filter-btn active" id="f-status-all" onclick="clearFilter('status')">All</button>
            <button class="filter-btn" id="f-status-Evaluated" onclick="toggleFilter('status', 'Evaluated')">⚪ Evaluated</button>
            <button class="filter-btn" id="f-status-Offered" onclick="toggleFilter('status', 'Offered')">🟡 Offered</button>
            <button class="filter-btn" id="f-status-Committed" onclick="toggleFilter('status', 'Committed')">🟢 Committed</button>
            <button class="filter-btn" id="f-status-Leaving" onclick="toggleFilter('status', 'Leaving')">🟠 Leaving</button>
            <button class="filter-btn" id="f-status-Declined" onclick="toggleFilter('status', 'Declined')">❌ Declined</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Rating:</span>
            <button class="filter-btn active" id="f-rating-all" onclick="clearFilter('rating')">All</button>
            <button class="filter-btn" id="f-rating-E" onclick="toggleFilter('rating', 'E')">Elite (E)</button>
            <button class="filter-btn" id="f-rating-P" onclick="toggleFilter('rating', 'P')">Premier (P)</button>
            <button class="filter-btn" id="f-rating-C" onclick="toggleFilter('rating', 'C')">Competitive (C)</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">New Team:</span>
            <button class="filter-btn active" id="f-team-all" onclick="clearFilter('team')">All</button>
            <button class="filter-btn" id="f-team-ECNL" onclick="toggleFilter('team', 'ECNL')">ECNL</button>
            <button class="filter-btn" id="f-team-ECNLRL" onclick="toggleFilter('team', 'ECNL-RL')">ECNL-RL</button>
            <button class="filter-btn" id="f-team-Gold" onclick="toggleFilter('team', 'Gold')">Gold</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th style="width: 180px;">Name</th>
                    <th style="width: 150px;">Current Team</th>
                    <th style="width: 80px;">Field</th>
                    <th style="width: 140px;">Rating</th>
                    <th style="width: 120px;">New Team</th>
                    <th style="width: 140px;">Status</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody id="playerTableBody"></tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBQz_2K0tNUfH5-CAxeuxGHiOPI6MEM95k",
  authDomain: "snefc-scout.firebaseapp.com",
  projectId: "snefc-scout",
  storageBucket: "snefc-scout.firebasestorage.app",
  messagingSenderId: "378551140348",
  appId: "1:378551140348:web:b84305dede4bd1a028bc79",
  measurementId: "G-PGQP39G25G"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// GLOBAL DATA
let remoteDB = { players: {}, teams: {}, seasons: {} };

// LOCAL DEVICE CONTEXT
let localContext = {
    activeTeam: localStorage.getItem('snefc_activeTeam') || '',
    activeSeason: localStorage.getItem('snefc_activeSeason') || '',
    filters: { status: new Set(), rating: new Set(), team: new Set() }
};

const ratingMap = { 'E': 'Elite (E)', 'P': 'Premier (P)', 'C': 'Competitive (C)', 'D': 'Developmental (D)', 'B': 'Bubble (B)' };

// Listen for global data changes
db.ref('/').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        remoteDB = data;
        // If local context is empty, try to set to current season from remote
        if(!localContext.activeSeason && data.seasons) {
            const current = Object.values(data.seasons).find(s => s.current);
            if(current) localContext.activeSeason = current.id;
        }
        if(!localContext.activeTeam && data.teams) {
            localContext.activeTeam = Object.keys(data.teams)[0];
        }
        render();
    }
});

function render() {
    // 1. Sync Dropdowns
    const tSel = document.getElementById('activeTeamSelect');
    tSel.innerHTML = Object.values(remoteDB.teams || {}).map(t => `<option value="${t.id}" ${localContext.activeTeam === t.id ? 'selected' : ''}>${t.name}</option>`).join('');
    
    const sSel = document.getElementById('activeSeasonSelect');
    sSel.innerHTML = Object.values(remoteDB.seasons || {}).map(s => `<option value="${s.id}" ${localContext.activeSeason === s.id ? 'selected' : ''}>${s.name} ${s.current ? '(Current)' : ''}</option>`).join('');

    const activeTeamName = remoteDB.teams?.[localContext.activeTeam]?.name || 'Select Team';
    const activeSeasonName = remoteDB.seasons?.[localContext.activeSeason]?.name || 'Season';
    document.getElementById('displayTitle').innerText = `${activeTeamName} - ${activeSeasonName}`;

    // 2. Table Filtering (Global Data + Local Filter State)
    const players = Object.values(remoteDB.players || {}).filter(p => p.contextTeamId === localContext.activeTeam && p.contextSeasonId === localContext.activeSeason);
    
    const visible = players.filter(p => {
        const sMatch = localContext.filters.status.size === 0 || localContext.filters.status.has(p.status || 'Evaluated');
        const rMatch = localContext.filters.rating.size === 0 || localContext.filters.rating.has(p.rating);
        const tMatch = localContext.filters.team.size === 0 || localContext.filters.team.has(p.team);
        return sMatch && rMatch && tMatch;
    });

    document.getElementById('playerTableBody').innerHTML = visible.map(p => `
        <tr>
            <td><input class="inline-edit" value="${p.number || ''}" onchange="updatePlayerField('${p.id}', 'number', this.value)"></td>
            <td><span class="player-link" onclick="openPlayerModal('${p.id}')">${p.firstName} ${p.lastName}</span></td>
            <td><input class="inline-edit" value="${p.currentTeam || ''}" onchange="updatePlayerField('${p.id}', 'currentTeam', this.value)"></td>
            <td><input class="inline-edit" value="${p.field || ''}" onchange="updatePlayerField('${p.id}', 'field', this.value)"></td>
            <td>
                <select class="inline-edit" onchange="updatePlayerField('${p.id}', 'rating', this.value)">
                    <option value="">--</option>
                    ${Object.entries(ratingMap).map(([k,v]) => `<option value="${k}" ${p.rating === k ? 'selected' : ''}>${v}</option>`).join('')}
                </select>
            </td>
            <td>
                <select class="inline-edit" onchange="updatePlayerField('${p.id}', 'team', this.value)">
                    <option value="">--</option><option value="ECNL" ${p.team==='ECNL'?'selected':''}>ECNL</option><option value="ECNL-RL" ${p.team==='ECNL-RL'?'selected':''}>ECNL-RL</option><option value="Gold" ${p.team==='Gold'?'selected':''}>Gold</option>
                </select>
            </td>
            <td>
                <select class="inline-edit" onchange="updatePlayerField('${p.id}', 'status', this.value)">
                    <option value="Evaluated" ${p.status==='Evaluated'?'selected':''}>⚪ Evaluated</option>
                    <option value="Offered" ${p.status==='Offered'?'selected':''}>🟡 Offered</option>
                    <option value="Committed" ${p.status==='Committed'?'selected':''}>🟢 Committed</option>
                    <option value="Leaving" ${p.status==='Leaving'?'selected':''}>🟠 Leaving</option>
                    <option value="Declined" ${p.status==='Declined'?'selected':''}>❌ Declined</option>
                </select>
            </td>
            <td><input class="inline-edit" value="${p.notes || ''}" onchange="updatePlayerField('${p.id}', 'notes', this.value)"></td>
        </tr>
    `).join('');

    // Update Filter Button UI
    updateFilterButtonVisuals();
}

function updateLocalContext(key, val) {
    localContext[key] = val;
    localStorage.setItem('snefc_' + key, val);
    render();
}

function toggleFilter(group, value) {
    if (localContext.filters[group].has(value)) localContext.filters[group].delete(value);
    else localContext.filters[group].add(value);
    render();
}

function clearFilter(group) {
    localContext.filters[group].clear();
    render();
}

function updateFilterButtonVisuals() {
    ['status', 'rating', 'team'].forEach(group => {
        const allBtn = document.getElementById(`f-${group}-all`);
        if (localContext.filters[group].size === 0) allBtn.classList.add('active');
        else allBtn.classList.remove('active');

        document.querySelectorAll(`.filter-btn[id^="f-${group}-"]`).forEach(btn => {
            if (btn.id.endsWith('-all')) return;
            const btnValue = btn.id.split('-').pop();
            const matchValue = (btnValue === 'ECNLRL') ? 'ECNL-RL' : btnValue;
            btn.classList.toggle('active', localContext.filters[group].has(matchValue));
        });
    });
}

function updatePlayerField(id, field, val) {
    db.ref(`players/${id}/${field}`).set(val);
}

// Modal and manual add functions reference remoteDB but update Firebase db.ref...
</script>
</body>
</html>
